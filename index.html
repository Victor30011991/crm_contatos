<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" data-color="ocean">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clientes Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#0b0d12;--surface:#13151d;--card:#181c27;--card2:#1e2233;--border:#252b3b;--border2:#2e364d;--text:#e8ecf4;--text2:#9aa3be;--text3:#5a6380;--shadow:rgba(0,0,0,.5);}
[data-theme="light"]{--bg:#eef1f8;--surface:#ffffff;--card:#ffffff;--card2:#f4f6fc;--border:#dde3f0;--border2:#c8d0e8;--text:#1a1e2e;--text2:#4a5272;--text3:#8891b0;--shadow:rgba(0,0,0,.1);}
[data-color="ocean"]{--a:#3d8ef0;--abg:rgba(61,142,240,.12);--a2:#34d1a0;--a2bg:rgba(52,209,160,.12);--w:#f5a623;--wbg:rgba(245,166,35,.12);--d:#f05c6e;--dbg:rgba(240,92,110,.12);--grad:linear-gradient(135deg,#3d8ef0,#34d1a0);}
[data-color="sunset"]{--a:#f0603d;--abg:rgba(240,96,61,.12);--a2:#f0b13d;--a2bg:rgba(240,177,61,.12);--w:#f09e3d;--wbg:rgba(240,158,61,.12);--d:#f05c6e;--dbg:rgba(240,92,110,.12);--grad:linear-gradient(135deg,#f0603d,#f0b13d);}
[data-color="mint"]{--a:#2dcb91;--abg:rgba(45,203,145,.12);--a2:#2db8d4;--a2bg:rgba(45,184,212,.12);--w:#f5a623;--wbg:rgba(245,166,35,.12);--d:#f05c6e;--dbg:rgba(240,92,110,.12);--grad:linear-gradient(135deg,#2dcb91,#2db8d4);}
[data-color="rose"]{--a:#e056b8;--abg:rgba(224,86,184,.12);--a2:#9b6cf5;--a2bg:rgba(155,108,245,.12);--w:#f5a623;--wbg:rgba(245,166,35,.12);--d:#f05c6e;--dbg:rgba(240,92,110,.12);--grad:linear-gradient(135deg,#e056b8,#9b6cf5);}
[data-color="slate"]{--a:#64748b;--abg:rgba(100,116,139,.12);--a2:#94a3b8;--a2bg:rgba(148,163,184,.12);--w:#f59e0b;--wbg:rgba(245,158,11,.12);--d:#ef4444;--dbg:rgba(239,68,68,.12);--grad:linear-gradient(135deg,#64748b,#94a3b8);}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;font-size:14px;line-height:1.5;overscroll-behavior:none;transition:background .3s,color .3s;}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 1px 12px var(--shadow);padding:12px 16px;transition:background .3s,border-color .3s;}
.topbar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.logo-text{font-size:.9rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;}
.logo-text small{display:block;font-size:.65rem;font-weight:400;color:var(--text2);letter-spacing:.01em;}
.topbar-actions{display:flex;align-items:center;gap:6px;}
.icon-btn{width:34px;height:34px;border-radius:9px;background:var(--card2);border:1px solid var(--border);color:var(--text2);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative;}
.icon-btn:active{transform:scale(.92);background:var(--border);}
.icon-btn.active{background:var(--abg);border-color:var(--a);color:var(--a);}
.search-wrap{position:relative;}
.search-wrap .s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.9rem;pointer-events:none;}
#searchInput{width:100%;padding:10px 36px 10px 36px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;outline:none;transition:border .2s,background .3s;}
#searchInput:focus{border-color:var(--a);background:var(--card);}
#searchInput::placeholder{color:var(--text3);}
.s-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--border2);border:none;color:var(--text2);width:20px;height:20px;border-radius:50%;font-size:.65rem;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;}
.s-clear.on{display:flex;}

/* PILLS */
.pills-bar{display:flex;gap:6px;overflow-x:auto;padding:8px 16px;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border);}
.pills-bar::-webkit-scrollbar{display:none;}
.pill{padding:5px 13px;border-radius:20px;white-space:nowrap;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);transition:all .15s;flex-shrink:0;}
.pill.p-all.on{background:var(--abg);border-color:var(--a);color:var(--a);}
.pill.p-ativ.on{background:var(--a2bg);border-color:var(--a2);color:var(--a2);}
.pill.p-inat.on{background:var(--dbg);border-color:var(--d);color:var(--d);}

/* THEME PANEL */
.theme-panel{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;width:210px;box-shadow:0 8px 32px var(--shadow);z-index:300;opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;transition:all .18s;}
.theme-panel.open{opacity:1;transform:none;pointer-events:auto;}
.tp-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;}
.color-row{display:flex;justify-content:space-between;margin-bottom:12px;}
.cdot{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s;display:flex;align-items:center;justify-content:center;}
.cdot:active{transform:scale(.88);}
.cdot.sel{border-color:var(--text);}
.cdot.c-ocean{background:linear-gradient(135deg,#3d8ef0,#34d1a0);}
.cdot.c-sunset{background:linear-gradient(135deg,#f0603d,#f0b13d);}
.cdot.c-mint{background:linear-gradient(135deg,#2dcb91,#2db8d4);}
.cdot.c-rose{background:linear-gradient(135deg,#e056b8,#9b6cf5);}
.cdot.c-slate{background:linear-gradient(135deg,#64748b,#94a3b8);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);}
.toggle-label{font-size:.8rem;color:var(--text2);}
.sw{width:40px;height:23px;background:var(--border2);border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:17px;height:17px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
[data-theme="light"] .sw{background:var(--a);}
[data-theme="light"] .sw::after{transform:translateX(17px);}

/* ADV FILTERS */
.adv-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;font-size:.78rem;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg);user-select:none;}
.adv-badge{background:var(--a);color:#fff;border-radius:10px;padding:1px 7px;font-size:.65rem;font-weight:700;display:none;margin-left:4px;}
.adv-badge.on{display:inline;}
.adv-body{background:var(--surface);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .3s ease;}
.adv-body.open{max-height:500px;}
.adv-inner{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.sel-wrap{position:relative;}
.sel-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.7rem;pointer-events:none;}
select.asel{width:100%;padding:9px 28px 9px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;outline:none;appearance:none;transition:border .2s;}
select.asel:focus{border-color:var(--a);}
.range-wrap{display:flex;flex-direction:column;gap:6px;}
.range-head{display:flex;justify-content:space-between;align-items:center;}
.range-head span{font-size:.75rem;color:var(--text2);}
.range-head strong{font-size:.78rem;color:var(--w);font-family:'JetBrains Mono',monospace;}
input[type="range"]{width:100%;accent-color:var(--a);cursor:pointer;height:4px;}
.adv-clear-btn{padding:8px 12px;text-align:center;color:var(--d);font-size:.78rem;font-weight:600;border:1.5px dashed var(--dbg);border-radius:10px;cursor:pointer;transition:background .2s;}
.adv-clear-btn:active{background:var(--dbg);}

/* STATS BAR */
.stats-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-bottom:1px solid var(--border);background:var(--bg);}
.stats-n{font-size:.95rem;font-weight:800;color:var(--a);font-family:'JetBrains Mono',monospace;}
.stats-label{font-size:.72rem;color:var(--text3);margin-left:4px;}
.stats-total{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--w);}

/* UPLOAD */
.upload-zone{margin:10px 16px;border:2px dashed var(--border2);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.78rem;color:var(--text3);transition:border-color .2s,color .2s;background:var(--card2);}
.upload-zone:active,.upload-zone.over{border-color:var(--a);color:var(--a);}
.upload-zone input{display:none;}

/* CARDS */
#results{padding:10px 16px 90px;display:flex;flex-direction:column;gap:8px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s,box-shadow .2s,background .3s;}
.card:active{border-color:var(--a);box-shadow:0 0 0 3px var(--abg);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.card{animation:fadeUp .2s ease both;}
.card-bar{height:3px;background:var(--grad);}
.card.inativo .card-bar{background:linear-gradient(90deg,var(--d),#f09640);}

/* card head */
.card-head{padding:12px 14px 0;display:flex;align-items:flex-start;gap:10px;}
.card-av{width:38px;height:38px;border-radius:11px;background:var(--abg);color:var(--a);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0;letter-spacing:-.02em;border:1.5px solid var(--abg);}
.card.inativo .card-av{background:var(--dbg);color:var(--d);border-color:var(--dbg);}
.card-head-info{flex:1;min-width:0;}
.card-fantasia{font-size:.92rem;font-weight:700;line-height:1.25;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-cod{font-size:.67rem;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stag{padding:3px 9px;border-radius:20px;flex-shrink:0;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:1px;}
.stag.ativo{background:var(--a2bg);color:var(--a2);}
.stag.inativo{background:var(--dbg);color:var(--d);}

/* card fields */
.card-fields{padding:10px 14px 8px;display:flex;flex-direction:column;gap:6px;}
.cf{display:flex;align-items:flex-start;gap:8px;font-size:.78rem;line-height:1.4;}
.cf-ic{width:22px;height:22px;border-radius:6px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.72rem;flex-shrink:0;margin-top:1px;border:1px solid var(--border);}
.cf-body{flex:1;min-width:0;}
.cf-lbl{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:1px;}
.cf-val{color:var(--text);font-weight:500;display:block;}
.cf-val.mono{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.card-div{height:1px;background:var(--border);margin:0 14px;}

/* card footer */
.card-foot{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;}
.lim-lbl{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;}
.lim-val{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;margin-top:1px;}
.lim-val.v0{color:var(--text3);}
.lim-val.vl{color:var(--w);}
.lim-val.vh{color:var(--a2);}
.act-btn{padding:6px 12px;border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;}
.act-btn:active{background:var(--border2);}
.act-btn.primary{background:var(--abg);border-color:var(--a);color:var(--a);}
.act-btn.primary:active{background:var(--a);color:#fff;}

mark{background:var(--wbg);color:var(--w);border-radius:3px;padding:0 2px;font-weight:600;}
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-emoji{font-size:3rem;margin-bottom:12px;}
.empty h3{font-size:1rem;font-weight:700;color:var(--text2);margin-bottom:6px;}
.empty p{font-size:.8rem;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:20px;font-size:.8rem;font-weight:600;opacity:0;transition:all .2s;pointer-events:none;z-index:400;white-space:nowrap;box-shadow:0 4px 20px var(--shadow);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.fab{position:fixed;bottom:16px;right:16px;width:48px;height:48px;background:var(--grad);border:none;border-radius:50%;color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 18px var(--shadow);transition:transform .15s;}
.fab:active{transform:scale(.9);}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-head">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <div class="logo-text">Clientes Pro<small>Filtro inteligente</small></div>
    </div>
    <div class="topbar-actions">
      <label class="icon-btn" title="Carregar XLSX" style="cursor:pointer">
        📂<input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])">
      </label>
      <div style="position:relative">
        <button class="icon-btn" id="themeBtn" onclick="toggleTP()" title="Temas">🎨</button>
        <div class="theme-panel" id="themePanel">
          <div class="tp-label">Cor do tema</div>
          <div class="color-row">
            <div class="cdot c-ocean sel" data-c="ocean"  onclick="setColor('ocean',this)"></div>
            <div class="cdot c-sunset"    data-c="sunset" onclick="setColor('sunset',this)"></div>
            <div class="cdot c-mint"      data-c="mint"   onclick="setColor('mint',this)"></div>
            <div class="cdot c-rose"      data-c="rose"   onclick="setColor('rose',this)"></div>
            <div class="cdot c-slate"     data-c="slate"  onclick="setColor('slate',this)"></div>
          </div>
          <div class="toggle-row">
            <span class="toggle-label" id="themeLabel">🌙 Modo escuro</span>
            <div class="sw" onclick="toggleDark()"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input id="searchInput" type="search" placeholder="Buscar nome, bairro, endereço, cidade…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="s-clear" id="sClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="pills-bar">
  <button class="pill p-all on" data-s="all"     onclick="setStatus('all',this)">Todos</button>
  <button class="pill p-ativ"   data-s="ATIVO"   onclick="setStatus('ATIVO',this)">✅ Ativo</button>
  <button class="pill p-inat"   data-s="INATIVO" onclick="setStatus('INATIVO',this)">🔴 Inativo</button>
</div>

<div class="adv-header" onclick="toggleAdv()">
  <span>⚙️ Filtros avançados <span class="adv-badge" id="advBadge">0</span></span>
  <span id="advArr">▼</span>
</div>
<div class="adv-body" id="advBody">
  <div class="adv-inner">
    <div class="sel-wrap">
      <select class="asel" id="cidadeSel" onchange="onCidadeChange()">
        <option value="">🏙️ Todas as cidades</option>
      </select>
    </div>
    <div class="sel-wrap">
      <select class="asel" id="bairroSel" onchange="applyFilters()">
        <option value="">📍 Todos os bairros</option>
      </select>
    </div>
    <div class="range-wrap">
      <div class="range-head">
        <span>💰 Limite mínimo de crédito</span>
        <strong id="limDisp">R$ 0</strong>
      </div>
      <input type="range" id="limRange" min="0" max="1502200" step="1000" value="0"
             oninput="onRange(this.value)" onchange="applyFilters()">
    </div>
    <div class="sel-wrap">
      <select class="asel" id="sortSel" onchange="applyFilters()">
        <option value="">📶 Ordem padrão</option>
        <option value="fantasia">🔤 Nome A → Z</option>
        <option value="limite_d">💰 Maior limite primeiro</option>
        <option value="limite_a">💸 Menor limite primeiro</option>
        <option value="cidade">🏙️ Por cidade</option>
        <option value="bairro">📍 Por bairro</option>
      </select>
    </div>
    <div class="adv-clear-btn" onclick="clearAll()">🗑️ Limpar todos os filtros</div>
  </div>
</div>

<div class="stats-bar">
  <div><span class="stats-n" id="statsN">0</span><span class="stats-label">clientes encontrados</span></div>
  <span class="stats-total" id="statsTotal"></span>
</div>

<div class="upload-zone" id="upZone"
     onclick="document.getElementById('fileInput').click()"
     ondragover="this.classList.add('over');event.preventDefault()"
     ondragleave="this.classList.remove('over')"
     ondrop="handleDrop(event)">
  <span style="font-size:1.2rem">📂</span>
  <span id="upLabel">Carregar novo arquivo .xlsx — arraste ou toque aqui</span>
</div>

<div id="results"></div>
<button class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="toast" id="toast"></div>

// ── STATE ──
let allData = window.__DATA__ || [];
let filtered = [];
let curStatus = 'all';
let advOpen = false;
let tpOpen = false;

// ── INIT ──
function init() {
  buildCidades();
  applyFilters();
  restorePrefs();
}

// ── BUILD SELECTS ──
function buildCidades() {
  const sel = document.getElementById('cidadeSel');
  const cidades = [...new Set(allData.map(r => r.cidade))].sort();
  cidades.forEach(c => {
    const o = document.createElement('option');
    o.value = c;
    o.textContent = cleanLbl(c);
    sel.appendChild(o);
  });
}

// Called ONLY when cidade changes — rebuilds bairro list then filters
function onCidadeChange() {
  const cidade = document.getElementById('cidadeSel').value;
  buildBairros(cidade);
  applyFilters();
}

function buildBairros(cidade) {
  const sel = document.getElementById('bairroSel');
  sel.innerHTML = '<option value="">📍 Todos os bairros</option>';
  const src = cidade ? allData.filter(r => r.cidade === cidade) : allData;
  const bairros = [...new Set(src.map(r => r.bairro))].sort();
  bairros.forEach(b => {
    const o = document.createElement('option');
    o.value = b;
    o.textContent = cleanLbl(b);
    sel.appendChild(o);
  });
}

function cleanLbl(s) {
  return String(s).replace(/^\d+ - /, '');
}

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('sClear').classList.toggle('on', this.value.length > 0);
  applyFilters();
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('sClear').classList.remove('on');
  applyFilters();
}

// ── STATUS PILLS ──
function setStatus(s, btn) {
  curStatus = s;
  document.querySelectorAll('.pills-bar .pill').forEach(p => {
    p.classList.remove('on');
    if (p.dataset.s === s) p.classList.add('on');
  });
  applyFilters();
}

// ── RANGE ──
function onRange(v) {
  document.getElementById('limDisp').textContent = 'R$ ' + Number(v).toLocaleString('pt-BR');
}

// ── ADV TOGGLE ──
function toggleAdv() {
  advOpen = !advOpen;
  document.getElementById('advBody').classList.toggle('open', advOpen);
  document.getElementById('advArr').textContent = advOpen ? '▲' : '▼';
}

// ── THEME PANEL ──
function toggleTP() {
  tpOpen = !tpOpen;
  document.getElementById('themePanel').classList.toggle('open', tpOpen);
  document.getElementById('themeBtn').classList.toggle('active', tpOpen);
}
document.addEventListener('click', function(e) {
  if (tpOpen && !e.target.closest('[data-c]') && !e.target.closest('#themeBtn') && !e.target.closest('#themePanel')) {
    tpOpen = false;
    document.getElementById('themePanel').classList.remove('open');
    document.getElementById('themeBtn').classList.remove('active');
  }
});

function setColor(c, el) {
  document.documentElement.dataset.color = c;
  document.querySelectorAll('.cdot').forEach(d => d.classList.remove('sel'));
  el.classList.add('sel');
  localStorage.setItem('cp_color', c);
}

function toggleDark() {
  const cur = document.documentElement.dataset.theme;
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  document.getElementById('themeLabel').textContent = next === 'dark' ? '🌙 Modo escuro' : '☀️ Modo claro';
  localStorage.setItem('cp_theme', next);
}

function restorePrefs() {
  const t = localStorage.getItem('cp_theme');
  if (t) {
    document.documentElement.dataset.theme = t;
    document.getElementById('themeLabel').textContent = t === 'dark' ? '🌙 Modo escuro' : '☀️ Modo claro';
  }
  const c = localStorage.getItem('cp_color');
  if (c) {
    document.documentElement.dataset.color = c;
    document.querySelectorAll('.cdot').forEach(d => d.classList.toggle('sel', d.dataset.c === c));
  }
}

// ── CORE FILTER — SINGLE SOURCE OF TRUTH ──
function applyFilters() {
  const q       = document.getElementById('searchInput').value.trim().toLowerCase();
  const cidade  = document.getElementById('cidadeSel').value;
  const bairro  = document.getElementById('bairroSel').value;
  const limMin  = parseFloat(document.getElementById('limRange').value) || 0;
  const sort    = document.getElementById('sortSel').value;

  // Note: buildBairros is NOT called here — only called from onCidadeChange()
  // This prevents the bairro select from being reset on every keypress

  let data = [...allData];

  // 1. status
  if (curStatus !== 'all') {
    data = data.filter(r => r.ativo === curStatus);
  }

  // 2. cidade
  if (cidade) {
    data = data.filter(r => r.cidade === cidade);
  }

  // 3. bairro
  if (bairro) {
    data = data.filter(r => r.bairro === bairro);
  }

  // 4. limite mínimo
  if (limMin > 0) {
    data = data.filter(r => (r.limite || 0) >= limMin);
  }

  // 5. text search — ALL fields, ALL words must match
  if (q) {
    const words = q.split(/\s+/).filter(Boolean);
    data = data.filter(r => {
      const hay = [r.cidade, r.bairro, r.endereco, r.cliente, r.fantasia]
        .join(' ').toLowerCase();
      return words.every(w => hay.includes(w));
    });
  }

  // 6. sort
  if (sort === 'fantasia')  data.sort((a,b) => (a.fantasia||'').localeCompare(b.fantasia||''));
  else if (sort === 'limite_d') data.sort((a,b) => (b.limite||0) - (a.limite||0));
  else if (sort === 'limite_a') data.sort((a,b) => (a.limite||0) - (b.limite||0));
  else if (sort === 'cidade')   data.sort((a,b) => (a.cidade||'').localeCompare(b.cidade||''));
  else if (sort === 'bairro')   data.sort((a,b) => (a.bairro||'').localeCompare(b.bairro||''));

  filtered = data;

  // badge
  let n = 0;
  if (cidade) n++;
  if (bairro) n++;
  if (limMin > 0) n++;
  const badge = document.getElementById('advBadge');
  badge.textContent = n;
  badge.classList.toggle('on', n > 0);

  render(data, q);
}

// ── CLEAR ALL ──
function clearAll() {
  document.getElementById('searchInput').value = '';
  document.getElementById('sClear').classList.remove('on');
  document.getElementById('cidadeSel').value = '';
  document.getElementById('bairroSel').innerHTML = '<option value="">📍 Todos os bairros</option>';
  buildBairros('');
  document.getElementById('limRange').value = 0;
  document.getElementById('limDisp').textContent = 'R$ 0';
  document.getElementById('sortSel').value = '';
  curStatus = 'all';
  document.querySelectorAll('.pills-bar .pill').forEach(p => {
    p.classList.remove('on');
    if (p.dataset.s === 'all') p.classList.add('on');
  });
  applyFilters();
}

// ── RENDER ──
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function hl(text, q) {
  if (!q) return esc(text);
  let r = esc(text);
  q.split(/\s+/).filter(Boolean).forEach(w => {
    r = r.replace(new RegExp('(' + escRe(w) + ')', 'gi'), '<mark>$1</mark>');
  });
  return r;
}

function fmtR(v) {
  if (!v || v === 0) return '—';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:0});
}

function limCls(v) {
  if (!v || v === 0) return 'v0';
  if (v >= 100000) return 'vh';
  return 'vl';
}

function avatar(name) {
  const s = String(name || '?').replace(/^\d+ - /, '').replace(/[^a-zA-ZÀ-ÖØ-öø-ÿ\s]/g, '').trim();
  const ws = s.split(/\s+/).filter(Boolean);
  if (ws.length >= 2) return (ws[0][0] + ws[1][0]).toUpperCase();
  return s.slice(0, 2).toUpperCase() || '??';
}

function render(data, q) {
  document.getElementById('statsN').textContent = data.length;
  const total = data.reduce((s, r) => s + (r.limite || 0), 0);
  document.getElementById('statsTotal').textContent =
    data.length > 0 ? 'Σ R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits:0}) : '';

  const el = document.getElementById('results');

  if (data.length === 0) {
    el.innerHTML = `<div class="empty">
      <div class="empty-emoji">🔍</div>
      <h3>Nenhum resultado</h3>
      <p>Tente outros termos ou limpe os filtros.</p>
    </div>`;
    return;
  }

  // Store filtered globally so copyCard can access by index (no inline JSON)
  window.__filtered = data;

  el.innerHTML = data.map((r, i) => {
    const isIn = r.ativo === 'INATIVO';
    const av   = avatar(r.fantasia || r.cliente);
    const bairroClean  = cleanLbl(r.bairro);
    const cidadeClean  = cleanLbl(r.cidade);
    const clienteNome  = String(r.cliente).replace(/^\d+ - /, '');
    const clienteCod   = String(r.cliente).match(/^(\d+)/) ? String(r.cliente).match(/^(\d+)/)[1] : '';
    const delay = Math.min(i * 0.025, 0.3) + 's';

    return `<div class="card${isIn ? ' inativo' : ''}" style="animation-delay:${delay}">
      <div class="card-bar"></div>
      <div class="card-head">
        <div class="card-av">${esc(av)}</div>
        <div class="card-head-info">
          <div class="card-fantasia">${hl(r.fantasia || clienteNome, q)}</div>
          <div class="card-cod">${clienteCod ? clienteCod + ' · ' : ''}${hl(clienteNome, q)}</div>
        </div>
        <span class="stag ${isIn ? 'inativo' : 'ativo'}">${esc(r.ativo)}</span>
      </div>
      <div class="card-fields">
        <div class="cf">
          <div class="cf-ic">📍</div>
          <div class="cf-body">
            <span class="cf-lbl">Bairro</span>
            <span class="cf-val">${hl(bairroClean, q)}</span>
          </div>
        </div>
        <div class="cf">
          <div class="cf-ic">🏙️</div>
          <div class="cf-body">
            <span class="cf-lbl">Cidade</span>
            <span class="cf-val">${hl(cidadeClean, q)}</span>
          </div>
        </div>
        ${r.endereco ? `<div class="cf">
          <div class="cf-ic">🗺️</div>
          <div class="cf-body">
            <span class="cf-lbl">Endereço</span>
            <span class="cf-val">${hl(r.endereco, q)}</span>
          </div>
        </div>` : ''}
        <div class="cf">
          <div class="cf-ic">🏢</div>
          <div class="cf-body">
            <span class="cf-lbl">Razão Social</span>
            <span class="cf-val mono">${hl(r.cliente, q)}</span>
          </div>
        </div>
      </div>
      <div class="card-div"></div>
      <div class="card-foot">
        <div>
          <div class="lim-lbl">Limite de crédito</div>
          <div class="lim-val ${limCls(r.limite)}">${fmtR(r.limite)}</div>
        </div>
        <button class="act-btn primary" data-idx="${i}" onclick="copyCard(this)">📋 Copiar</button>
      </div>
    </div>`;
  }).join('');
}

// ── COPY — uses index into window.__filtered (no inline JSON) ──
function copyCard(btn) {
  const i = parseInt(btn.dataset.idx, 10);
  const r = window.__filtered[i];
  if (!r) return;
  const txt = [
    '📋 ' + (r.fantasia || r.cliente),
    '🏢 ' + r.cliente,
    '📍 Bairro: ' + r.bairro,
    '🏙️ Cidade: ' + r.cidade,
    r.endereco ? '🗺️ ' + r.endereco : '',
    '💰 Limite: ' + fmtR(r.limite),
    'Status: ' + r.ativo
  ].filter(Boolean).join('\n');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(() => toast('✅ Copiado!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✅ Copiado!');
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2000);
}

// ── FILE UPLOAD ──
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upZone').classList.remove('over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
}

function handleFile(file) {
  if (!file) return;
  if (typeof XLSX === 'undefined') { toast('⏳ Aguarde o carregamento…'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type: 'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {defval: ''});
      if (!raw.length) { toast('❌ Arquivo vazio'); return; }

      const rawKeys = Object.keys(raw[0]);
      const findKey = (patterns) =>
        rawKeys.find(k => patterns.some(p => k.toLowerCase().replace(/[^a-z]/g,'').includes(p))) || null;

      const map = {
        cidade:   findKey(['cidade','cidadecliente','city']),
        bairro:   findKey(['bairro','neighborhood','district']),
        endereco: findKey(['ende','endereco','address']),
        cliente:  findKey(['cliente','client','nome','razaosocial','razao']),
        fantasia: findKey(['fantasia','nomefantasia']),
        limite:   findKey(['lim','limite','limtotal','credit']),
        ativo:    findKey(['ativo','status','active'])
      };

      allData = raw.map(row => ({
        cidade:   String(row[map.cidade]   || ''),
        bairro:   String(row[map.bairro]   || ''),
        endereco: String(row[map.endereco] || ''),
        cliente:  String(row[map.cliente]  || ''),
        fantasia: String(row[map.fantasia] || ''),
        limite:   parseFloat(row[map.limite]) || 0,
        ativo:    String(row[map.ativo]    || 'ATIVO').toUpperCase().trim()
      }));

      // rebuild dropdowns
      document.getElementById('cidadeSel').innerHTML = '<option value="">🏙️ Todas as cidades</option>';
      buildCidades();
      clearAll();
      toast('✅ ' + allData.length + ' clientes carregados!');
      document.getElementById('upLabel').textContent = '✅ ' + file.name + ' — ' + allData.length + ' registros';
    } catch(err) {
      toast('❌ Erro ao ler arquivo');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

init();
</script>
