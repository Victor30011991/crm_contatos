<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" data-color="ocean">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clientes Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#0b0d12;--surface:#13151d;--card:#181c27;--card2:#1e2233;--border:#252b3b;--border2:#2e364d;--text:#e8ecf4;--text2:#9aa3be;--text3:#5a6380;--shadow:rgba(0,0,0,.5);}
[data-theme="light"]{--bg:#eef1f8;--surface:#ffffff;--card:#ffffff;--card2:#f4f6fc;--border:#dde3f0;--border2:#c8d0e8;--text:#1a1e2e;--text2:#4a5272;--text3:#8891b0;--shadow:rgba(0,0,0,.1);}
[data-color="ocean"]{--a:#3d8ef0;--abg:rgba(61,142,240,.12);--a2:#34d1a0;--a2bg:rgba(52,209,160,.12);--w:#f5a623;--wbg:rgba(245,166,35,.12);--d:#f05c6e;--dbg:rgba(240,92,110,.12);--grad:linear-gradient(135deg,#3d8ef0,#34d1a0);}
[data-color="sunset"]{--a:#f0603d;--abg:rgba(240,96,61,.12);--a2:#f0b13d;--a2bg:rgba(240,177,61,.12);--w:#f09e3d;--wbg:rgba(240,158,61,.12);--d:#f05c6e;--dbg:rgba(240,92,110,.12);--grad:linear-gradient(135deg,#f0603d,#f0b13d);}
[data-color="mint"]{--a:#2dcb91;--abg:rgba(45,203,145,.12);--a2:#2db8d4;--a2bg:rgba(45,184,212,.12);--w:#f5a623;--wbg:rgba(245,166,35,.12);--d:#f05c6e;--dbg:rgba(240,92,110,.12);--grad:linear-gradient(135deg,#2dcb91,#2db8d4);}
[data-color="rose"]{--a:#e056b8;--abg:rgba(224,86,184,.12);--a2:#9b6cf5;--a2bg:rgba(155,108,245,.12);--w:#f5a623;--wbg:rgba(245,166,35,.12);--d:#f05c6e;--dbg:rgba(240,92,110,.12);--grad:linear-gradient(135deg,#e056b8,#9b6cf5);}
[data-color="slate"]{--a:#64748b;--abg:rgba(100,116,139,.12);--a2:#94a3b8;--a2bg:rgba(148,163,184,.12);--w:#f59e0b;--wbg:rgba(245,158,11,.12);--d:#ef4444;--dbg:rgba(239,68,68,.12);--grad:linear-gradient(135deg,#64748b,#94a3b8);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;font-size:14px;line-height:1.5;overscroll-behavior:none;transition:background .3s,color .3s;padding-bottom:70px;}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 1px 12px var(--shadow);padding:12px 16px;transition:background .3s;}
.topbar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.logo-text{font-size:.9rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;}
.logo-text small{display:block;font-size:.65rem;font-weight:400;color:var(--text2);}
.topbar-actions{display:flex;align-items:center;gap:6px;}
.icon-btn{width:34px;height:34px;border-radius:9px;background:var(--card2);border:1px solid var(--border);color:var(--text2);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.icon-btn:active{transform:scale(.9);}
.icon-btn.active{background:var(--abg);border-color:var(--a);}
.search-wrap{position:relative;}
.s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
#searchInput{width:100%;padding:10px 36px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;outline:none;transition:border .2s;}
#searchInput:focus{border-color:var(--a);}
#searchInput::placeholder{color:var(--text3);}
.s-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--border2);border:none;color:var(--text2);width:20px;height:20px;border-radius:50%;font-size:.65rem;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;}
.s-clear.on{display:flex;}
/* PILLS */
.pills-bar{display:flex;gap:6px;overflow-x:auto;padding:8px 16px;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border);}
.pills-bar::-webkit-scrollbar{display:none;}
.pill{padding:5px 14px;border-radius:20px;white-space:nowrap;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);transition:all .15s;flex-shrink:0;}
.pill.p-all.on{background:var(--abg);border-color:var(--a);color:var(--a);}
.pill.p-ativ.on{background:var(--a2bg);border-color:var(--a2);color:var(--a2);}
.pill.p-inat.on{background:var(--dbg);border-color:var(--d);color:var(--d);}
/* THEME PANEL */
.theme-panel{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;width:210px;box-shadow:0 8px 32px var(--shadow);z-index:300;opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;transition:all .18s;}
.theme-panel.open{opacity:1;transform:none;pointer-events:auto;}
.tp-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;}
.color-row{display:flex;justify-content:space-between;margin-bottom:12px;}
.cdot{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s;}
.cdot:active{transform:scale(.88);}
.cdot.sel{border-color:var(--text);}
.cdot.c-ocean{background:linear-gradient(135deg,#3d8ef0,#34d1a0);}
.cdot.c-sunset{background:linear-gradient(135deg,#f0603d,#f0b13d);}
.cdot.c-mint{background:linear-gradient(135deg,#2dcb91,#2db8d4);}
.cdot.c-rose{background:linear-gradient(135deg,#e056b8,#9b6cf5);}
.cdot.c-slate{background:linear-gradient(135deg,#64748b,#94a3b8);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);}
.toggle-label{font-size:.8rem;color:var(--text2);}
.sw{width:40px;height:23px;background:var(--border2);border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:17px;height:17px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
[data-theme="light"] .sw{background:var(--a);}
[data-theme="light"] .sw::after{transform:translateX(17px);}
/* ADV FILTERS */
.adv-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;font-size:.78rem;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg);user-select:none;}
.adv-badge{background:var(--a);color:#fff;border-radius:10px;padding:1px 7px;font-size:.65rem;font-weight:700;display:none;margin-left:4px;}
.adv-badge.on{display:inline;}
.adv-body{background:var(--surface);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .3s ease;}
.adv-body.open{max-height:500px;}
.adv-inner{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.sel-wrap{position:relative;}
.sel-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.7rem;pointer-events:none;}
select.asel,.asel{width:100%;padding:9px 28px 9px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;outline:none;appearance:none;transition:border .2s;}
select.asel:focus,.asel:focus{border-color:var(--a);}
.range-wrap{display:flex;flex-direction:column;gap:6px;}
.range-head{display:flex;justify-content:space-between;align-items:center;}
.range-head span{font-size:.75rem;color:var(--text2);}
.range-head strong{font-size:.78rem;color:var(--w);font-family:'JetBrains Mono',monospace;}
input[type="range"]{width:100%;accent-color:var(--a);cursor:pointer;height:4px;}
.adv-clear-btn{padding:8px 12px;text-align:center;color:var(--d);font-size:.78rem;font-weight:600;border:1.5px dashed var(--dbg);border-radius:10px;cursor:pointer;transition:background .2s;}
.adv-clear-btn:active{background:var(--dbg);}
/* STATS */
.stats-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-bottom:1px solid var(--border);background:var(--bg);}
.stats-n{font-size:.95rem;font-weight:800;color:var(--a);font-family:'JetBrains Mono',monospace;}
.stats-label{font-size:.72rem;color:var(--text3);margin-left:4px;}
.stats-total{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--w);}
/* UPLOAD */
.upload-zone{margin:10px 16px;border:2px dashed var(--border2);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.78rem;color:var(--text3);transition:border-color .2s;background:var(--card2);}
.upload-zone:active{border-color:var(--a);color:var(--a);}
/* CARDS */
#results{padding:10px 16px 10px;display:flex;flex-direction:column;gap:8px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;animation:fadeUp .2s ease both;transition:border-color .2s,background .3s;}
.card:active{border-color:var(--a);box-shadow:0 0 0 3px var(--abg);}
.card-bar{height:3px;background:var(--grad);}
.card.inativo .card-bar{background:linear-gradient(90deg,var(--d),#f09640);}
.card-head{padding:12px 14px 0;display:flex;align-items:flex-start;gap:10px;}
.card-av{width:38px;height:38px;border-radius:11px;background:var(--abg);color:var(--a);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:800;flex-shrink:0;}
.card-av.small{width:32px;height:32px;border-radius:9px;font-size:.72rem;}
.card.inativo .card-av{background:var(--dbg);color:var(--d);}
.card-head-info{flex:1;min-width:0;}
.card-fantasia{font-size:.92rem;font-weight:700;line-height:1.25;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-cod{font-size:.67rem;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stag{padding:3px 9px;border-radius:20px;flex-shrink:0;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:1px;}
.stag.ativo{background:var(--a2bg);color:var(--a2);}
.stag.inativo{background:var(--dbg);color:var(--d);}
.card-fields{padding:10px 14px 8px;display:flex;flex-direction:column;gap:6px;}
.cf{display:flex;align-items:flex-start;gap:8px;font-size:.78rem;line-height:1.4;}
.cf-ic{width:22px;height:22px;border-radius:6px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.72rem;flex-shrink:0;margin-top:1px;border:1px solid var(--border);}
.cf-body{flex:1;min-width:0;}
.cf-lbl{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:1px;}
.cf-val{color:var(--text);font-weight:500;display:block;}
.cf-val.mono{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-div{height:1px;background:var(--border);margin:0 14px;}
.card-foot{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;}
.lim-lbl{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;}
.lim-val{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;margin-top:1px;}
.lim-val.v0{color:var(--text3);}.lim-val.vl{color:var(--w);}.lim-val.vh{color:var(--a2);}
mark{background:var(--wbg);color:var(--w);border-radius:3px;padding:0 2px;font-weight:600;}
/* BUTTONS */
.act-btn{padding:6px 12px;border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;}
.act-btn:active{background:var(--border2);}
.act-btn.primary{background:var(--abg);border-color:var(--a);color:var(--a);}
.act-btn.primary:active{background:var(--a);color:#fff;}
.btn-primary{width:100%;padding:12px;background:var(--grad);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .15s;}
.btn-primary:active{opacity:.85;}
.btn-secondary{padding:10px 16px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;color:var(--text2);font-weight:600;font-size:.82rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;}
.btn-secondary:active{background:var(--border);}
.btn-danger{padding:10px 16px;background:var(--dbg);border:1.5px solid var(--d);border-radius:10px;color:var(--d);font-weight:600;font-size:.82rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
/* PAGE LAYOUT */
.page-header{padding:16px 16px 0;background:var(--surface);border-bottom:1px solid var(--border);padding-bottom:12px;position:sticky;top:0;z-index:100;}
.page-header h2{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;}
.page-sub{font-size:.75rem;color:var(--text2);margin-top:2px;}
.back-btn{background:none;border:none;color:var(--a);font-size:.78rem;font-weight:600;cursor:pointer;padding:0;margin-bottom:6px;font-family:'Plus Jakarta Sans',sans-serif;}
.page-body{padding:12px 16px;display:flex;flex-direction:column;gap:12px;}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;}
.form-section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.form-label{font-size:.75rem;font-weight:600;color:var(--text2);}
/* NAV BAR */
.navbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:150;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;background:none;border:none;color:var(--text3);font-size:.6rem;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;position:relative;gap:3px;transition:color .15s;}
.nav-btn.active{color:var(--a);}
.nav-btn .ni{font-size:1.3rem;line-height:1;}
.nav-badge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--d);color:#fff;border-radius:10px;padding:0 5px;font-size:.58rem;font-weight:800;display:none;}
/* JOGO */
.jogo-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;}
.jogo-cidade{font-size:1rem;font-weight:800;letter-spacing:-.02em;margin-bottom:10px;}
.mix-item{margin-bottom:8px;}
.mix-head{display:flex;justify-content:space-between;font-size:.75rem;font-weight:600;margin-bottom:4px;}
.mix-bar-bg{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
.mix-bar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.jogo-stats-row{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
.js-pill{padding:4px 10px;background:var(--card2);border:1px solid var(--border);border-radius:20px;font-size:.72rem;color:var(--text2);}
.js-end{margin-left:auto;padding:6px 14px;background:var(--dbg);border:1.5px solid var(--d);border-radius:20px;color:var(--d);font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.jogo-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);}
.jtab{flex:1;padding:10px;background:none;border:none;color:var(--text3);font-size:.78rem;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-bottom:2px solid transparent;transition:all .15s;}
.jtab.on{color:var(--a);border-bottom-color:var(--a);}
#jogoLista{padding:10px 16px;display:flex;flex-direction:column;gap:8px;}
.jcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.jcard.visited{opacity:.55;}
.jcard-head{padding:12px;display:flex;align-items:center;gap:10px;}
.jcard-nome{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jcard-end{font-size:.7rem;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jcard-lim{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--w);flex-shrink:0;font-weight:700;}
.jcard-actions{display:flex;gap:6px;padding:0 12px 12px;}
.jbtn{flex:1;padding:8px 4px;border-radius:10px;font-size:.72rem;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .15s;}
.jbtn:active{opacity:.7;}
.jbtn.verde{background:#1a3f29;color:#34d1a0;}
.jbtn.azul{background:var(--abg);color:var(--a);}
.jbtn.cinza{background:var(--card2);color:var(--text3);}
.bairro-grid{display:flex;flex-wrap:wrap;gap:6px;}
.bairro-chip{padding:6px 12px;border-radius:20px;background:var(--card2);border:1.5px solid var(--border);font-size:.75rem;cursor:pointer;transition:all .15s;}
.bairro-chip.sel{background:var(--abg);border-color:var(--a);color:var(--a);}
.jogo-preview{display:flex;justify-content:center;padding:12px 0;}
.jp-stat{text-align:center;}
.jp-stat span{display:block;font-size:2rem;font-weight:800;color:var(--a);font-family:'JetBrains Mono',monospace;}
.jp-stat small{font-size:.72rem;color:var(--text3);}
/* VENDA */
.venda-item{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.mini-input{padding:8px 10px;background:var(--card2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;outline:none;width:70px;text-align:center;}
.mini-input:focus{border-color:var(--a);}
.del-btn{background:var(--dbg);border:none;color:var(--d);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:.8rem;flex-shrink:0;}
.venda-total-wrap{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--border);margin-bottom:10px;}
.venda-total{font-family:'JetBrains Mono',monospace;font-size:1rem;color:var(--a2);font-weight:700;}
/* AGENDA */
.agenda-group{margin-bottom:16px;}
.agenda-group-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.agenda-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.agenda-card-head{display:flex;align-items:center;justify-content:space-between;}
.agenda-nome{font-size:.88rem;font-weight:700;}
.agenda-data{font-size:.72rem;font-weight:600;margin-top:2px;}
.agenda-obs{font-size:.75rem;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
/* CONFIG */
.prod-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.prod-item:last-child{border-bottom:none;}
.prod-nome{font-size:.82rem;font-weight:600;}
.add-prod-row{display:flex;align-items:center;gap:6px;margin-top:10px;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 30px;width:100%;max-width:500px;}
.modal-title{font-size:1rem;font-weight:800;margin-bottom:14px;}
/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:20px;font-size:.8rem;font-weight:600;opacity:0;transition:all .2s;pointer-events:none;z-index:600;white-space:nowrap;box-shadow:0 4px 20px var(--shadow);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty-emoji{font-size:3rem;margin-bottom:12px;}
.empty h3{font-size:1rem;font-weight:700;color:var(--text2);margin-bottom:6px;}
.empty p{font-size:.8rem;}

  DOMINIOS_PERMITIDOS: [

  // ── VERIFICAR DOMÍNIO ──
  checkDominio() {
    const host = window.location.hostname;
    const ok = this.DOMINIOS_PERMITIDOS.some(d => host === d || host.endsWith('.' + d));
    if (!ok) {
      this._bloquear(`Este sistema está registrado para uso exclusivo em domínios autorizados.\n\nDomínio atual: ${host}\n\nPara adquirir uma licença, entre em contato com ${this.DONO}.`);

  // ── TRIAL / EXPIRAÇÃO ──
  checkTrial() {
    const key = 'cp_install_date';
    let instDate = localStorage.getItem(key);
    if (!instDate) {
      instDate = new Date().toISOString();
      localStorage.setItem(key, instDate);
    }
    const dias = Math.floor((Date.now() - new Date(instDate)) / 86400000);
    const restam = this.TRIAL_DIAS - dias;

    if (restam <= 0) {

  _bloquear(msg) {

      <div style="margin-top:24px;font-size:.7rem;color:#5a6380">Clientes Pro v${this.VERSAO}</div>
    </div>`;
  },

  // ── ANTI-DEVTOOLS (dificulta inspeção) ──
  antiDevtools() {
    // detecta abertura do devtools pelo tamanho da janela
    const threshold = 160;
    setInterval(() => {
      if (
        window.outerWidth - window.innerWidth > threshold ||
        window.outerHeight - window.innerHeight > threshold
      ) {
        // não bloqueia (seria agressivo), apenas embaralha o estado
        console.clear();
      }
    }, 1500);

    // desabilita clique direito
    document.addEventListener('contextmenu', e => e.preventDefault());

    // desabilita F12, Ctrl+Shift+I, Ctrl+U
    document.addEventListener('keydown', e => {
      if (
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) ||
        (e.ctrlKey && e.key.toUpperCase() === 'U')
      ) {
        e.preventDefault();
        return false;
      }
    });
  },

  // ── INIT ──
  init() {
    if (!this.checkDominio()) return false;
    if (!this.checkTrial()) return false;
    this.antiDevtools();
    return true;
  }
};

const E = {
  // ── ESTADO ──
  usuario: JSON.parse(localStorage.getItem('cp_usuario') || 'null') || { nome: '', empresa: '' },
  baseDados: [],
  metas: JSON.parse(localStorage.getItem('cp_metas') || 'null') || {
    produtos: [
      { id: 1, nome: 'Sardinha',   meta: 12 },
      { id: 2, nome: 'Rosquinhas', meta: 15 },
      { id: 3, nome: 'Café',       meta: 12 }
    ]
  },
  agenda: JSON.parse(localStorage.getItem('cp_agenda') || '[]'),
  jogo: JSON.parse(localStorage.getItem('cp_jogo_atual') || 'null') || {
    emAndamento: false, cidade: '', bairros: [], bairroAtual: '',
    visitasRealizadas: 0, vendasContabilizadas: [],
    clientesPositivadosLog: {}, interrupcaoMotivo: null, startTime: null
  },

  // ── PERSISTÊNCIA ──
  save() {
    localStorage.setItem('cp_usuario',    JSON.stringify(this.usuario));
    localStorage.setItem('cp_dados',      JSON.stringify(this.baseDados));
    localStorage.setItem('cp_metas',      JSON.stringify(this.metas));
    localStorage.setItem('cp_agenda',     JSON.stringify(this.agenda));
    localStorage.setItem('cp_jogo_atual', JSON.stringify(this.jogo));
  },

  // ── CARREGAR BASE ──
  carregarBase() {
    const salvo = localStorage.getItem('cp_dados');
    if (salvo) {
      this.baseDados = JSON.parse(salvo);
    } else {
      // Normaliza window.__DATA__ (planilha original)
      this.baseDados = (window.__DATA__ || []).map((r, i) => this._normalizar(r, i));
      this.save();
    }
  },

  _normalizar(r, idx) {
    const clienteStr = String(r.cliente || '');
    const codeMatch  = clienteStr.match(/^(\d+)/);
    const id         = codeMatch ? codeMatch[1] : String(idx + 1);
    let   fantasia   = String(r.fantasia || '').trim();
    if (!fantasia || fantasia.startsWith('***') || fantasia === fantasia.toUpperCase() && fantasia === clienteStr)
      fantasia = clienteStr.replace(/^\d+\s*[-–]\s*/, '').trim();
    return {
      _id:      id,
      cidade:   String(r.cidade   || '').trim(),
      bairro:   String(r.bairro   || '').trim(),
      endereco: String(r.endereco || '').trim(),
      cliente:  clienteStr.trim(),
      fantasia: fantasia,
      limite:   parseFloat(r.limite) || 0,
      ativo:    String(r.ativo || 'ATIVO').toUpperCase().trim(),
      _novo:    r._novo || false,
      _editado: r._editado || false
    };
  },

  // ── PLANILHA BRUTA (array-of-arrays) ──
  processarPlanilhaBruta(rows) {
    if (!rows || rows.length < 2) return;
    const header = rows[0];
    const map = { cidade:null, bairro:null, endereco:null, cliente:null, fantasia:null, limite:null, ativo:null };
    header.forEach((col, i) => {
      const c = String(col).toUpperCase().trim();
      if      (/CIDAD|MUNIC/.test(c))        map.cidade   = i;
      else if (/BAIRRO|REGIAO|REGI/.test(c)) map.bairro   = i;
      else if (/ENDE|LOGRA/.test(c))         map.endereco = i;
      else if (/FANTASIA|NOME_COM/.test(c))  map.fantasia = i;
      else if (/CLIENTE|RAZAO/.test(c))      map.cliente  = i;
      else if (/LIM|CRED|R\$/.test(c))       map.limite   = i;
      else if (/ATIVO|SITUA/.test(c))        map.ativo    = i;
    });
    // Manter clientes novos cadastrados em campo
    const novos = this.baseDados.filter(r => r._novo);
    this.baseDados = rows.slice(1)
      .filter(r => r && r.length > 0)
      .map((row, i) => this._normalizar({
        cidade:   row[map.cidade],
        bairro:   row[map.bairro],
        endereco: row[map.endereco],
        cliente:  row[map.cliente],
        fantasia: row[map.fantasia],
        limite:   parseFloat(String(row[map.limite] || '').replace(/[^\d.-]/g, '')),
        ativo:    row[map.ativo]
      }, i))
      .concat(novos);
    this.save();
  },

  // ── BUSCA LIVRE (multi-campo) ──
  buscar(query) {
    if (!query) return this.baseDados;
    const words = query.trim().toLowerCase().split(/\s+/).filter(Boolean);
    return this.baseDados.filter(r => {
      const hay = [r._id, r.cidade, r.bairro, r.endereco, r.cliente, r.fantasia]
        .join(' ').toLowerCase();
      return words.every(w => hay.includes(w));
    });
  },

  // ── CRUD ──
  adicionarCliente(dados) {
    const novo = this._normalizar({ ...dados, _novo: true }, Date.now());
    novo._id = 'N' + Date.now();
    this.baseDados.push(novo);
    this.save();
    return novo;
  },
  atualizarCliente(id, dados) {
    const i = this.baseDados.findIndex(r => r._id === id);
    if (i !== -1) {
      this.baseDados[i] = { ...this.baseDados[i], ...dados, _editado: true };
      this.save();
    }
  },

  // ── AGENDA ──
  agendarRetorno(clienteId, data, obs = '') {
    this.agenda.push({ id: Date.now(), clienteId, data, obs: obs || 'Retorno agendado', concluido: false });
    this.save();
  },
  concluirAgenda(id) {
    const a = this.agenda.find(x => x.id === id);
    if (a) { a.concluido = true; this.save(); }
  },

  // ── JOGO / ROTA ──
  iniciarJogo(cidade, bairros) {
    this.jogo = {
      emAndamento: true, cidade, bairros, bairroAtual: bairros[0] || '',
      visitasRealizadas: 0, vendasContabilizadas: [],
      clientesPositivadosLog: {}, interrupcaoMotivo: null,
      startTime: Date.now()
    };
    this.save();
  },
  registrarVenda(clienteId, produtoNome, quantidade, valorUnitario) {
    const total = quantidade * valorUnitario;
    this.jogo.vendasContabilizadas.push({ clienteId, produto: produtoNome, qtd: quantidade, total, ts: Date.now() });
    if (!this.jogo.clientesPositivadosLog[produtoNome])
      this.jogo.clientesPositivadosLog[produtoNome] = [];
    if (!this.jogo.clientesPositivadosLog[produtoNome].includes(clienteId))
      this.jogo.clientesPositivadosLog[produtoNome].push(clienteId);
    this.jogo.visitasRealizadas++;
    this.save();
  },
  agendarEmRota(clienteId, data, obs) {
    this.agendarRetorno(clienteId, data, obs);
    this.jogo.vendasContabilizadas.push({ clienteId, produto: 'AGENDADO', qtd: 0, total: 0, ts: Date.now() });
    this.jogo.visitasRealizadas++;
    this.save();
  },
  encerrarJogo(motivo = null) {
    this.jogo.emAndamento = false;
    this.jogo.interrupcaoMotivo = motivo;
    this.save();
  },

  // ── STATS DO JOGO ──
  statsJogo() {
    const v = this.jogo.vendasContabilizadas;
    const totalR = v.reduce((s, x) => s + (x.total || 0), 0);
    const posit  = this.jogo.clientesPositivadosLog;
    const byProd = {};
    this.metas.produtos.forEach(p => {
      byProd[p.nome] = {
        meta:      p.meta,
        positivados: (posit[p.nome] || []).length,
        pct: Math.round(((posit[p.nome] || []).length / p.meta) * 100)
      };
    });
    return {
      visitas:   this.jogo.visitasRealizadas,
      vendas:    v.filter(x => x.produto !== 'AGENDADO' && x.produto !== 'NENHUM (AGENDADO)').length,
      totalR,
      byProd,
      tempo: this.jogo.startTime ? Math.round((Date.now() - this.jogo.startTime) / 60000) : 0
    };
  },

  // ── METAS ──
  adicionarProduto(nome, meta) {
    this.metas.produtos.push({ id: Date.now(), nome, meta: parseInt(meta) || 10 });
    this.save();
  },
  removerProduto(id) {
    this.metas.produtos = this.metas.produtos.filter(p => p.id !== id);
    this.save();
  },
  editarMeta(id, novaMeta) {
    const p = this.metas.produtos.find(x => x.id === id);
    if (p) { p.meta = parseInt(novaMeta) || p.meta; this.save(); }
  }
};

  render() {
    const app = document.getElementById('app');
    switch(this.tela) {
      case 'lista':       app.innerHTML = this.renderLista();    break;
      case 'jogo':        app.innerHTML = this.renderJogo();     break;
      case 'jogo_visita': app.innerHTML = this.renderVisita();   break;
      case 'agenda':      app.innerHTML = this.renderAgenda();   break;
      case 'config':      app.innerHTML = this.renderConfig();   break;
      case 'cadastro':    app.innerHTML = this.renderCadastro(); break;
    }
    this._bind();
    this._updateNav();
  },

  // ── HELPERS ──
  esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); },
  fmtR(v){ if(!v||v===0)return'—'; return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:0}); },
  cleanId(s){ return String(s||'').replace(/^\d+\s*[-–]\s*/,''); },
  avatar(name){
    const s=String(name||'?').replace(/^\d+\s*[-–]\s*/,'').replace(/[^a-zA-ZÀ-ÖØ-öø-ÿ\s]/g,'').trim();
    const ws=s.split(/\s+/).filter(Boolean);
    return ws.length>=2?(ws[0][0]+ws[1][0]).toUpperCase():s.slice(0,2).toUpperCase()||'??';
  },
  hl(text,q){
    if(!q)return this.esc(text);
    let r=this.esc(text);
    q.trim().split(/\s+/).filter(Boolean).forEach(w=>{
      r=r.replace(new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
    });
    return r;
  },
  limCls(v){ return !v||v===0?'v0':v>=100000?'vh':'vl'; },

  // ══════════════════════════════════════
  //  TELA 1 — LISTA
  // ══════════════════════════════════════
  renderLista() {
    const f = this._filtros;
    const cidades = [...new Set(E.baseDados.map(r=>r.cidade))].sort();
    const bairrosSrc = f.cidade ? E.baseDados.filter(r=>r.cidade===f.cidade) : E.baseDados;
    const bairros = [...new Set(bairrosSrc.map(r=>r.bairro))].sort();

    let data = [...E.baseDados];
    if(f.status!=='all') data=data.filter(r=>r.ativo===f.status);
    if(f.cidade)         data=data.filter(r=>r.cidade===f.cidade);
    if(f.bairro)         data=data.filter(r=>r.bairro===f.bairro);
    if(f.limMin>0)       data=data.filter(r=>r.limite>=f.limMin);
    if(f.q){
      const words=f.q.toLowerCase().split(/\s+/).filter(Boolean);
      data=data.filter(r=>{
        const hay=[r._id,r.cidade,r.bairro,r.endereco,r.cliente,r.fantasia,r.telefone||''].join(' ').toLowerCase();
        return words.every(w=>hay.includes(w));
      });
    }
    if(f.sort==='fantasia') data.sort((a,b)=>(a.fantasia||'').localeCompare(b.fantasia||''));
    else if(f.sort==='ld')  data.sort((a,b)=>(b.limite||0)-(a.limite||0));
    else if(f.sort==='la')  data.sort((a,b)=>(a.limite||0)-(b.limite||0));
    else if(f.sort==='cid') data.sort((a,b)=>(a.cidade||'').localeCompare(b.cidade||''));
    else if(f.sort==='bai') data.sort((a,b)=>(a.bairro||'').localeCompare(b.bairro||''));

    window.__filtered = data;
    const total = data.reduce((s,r)=>s+(r.limite||0),0);
    const advN = [f.cidade,f.bairro,f.limMin>0?1:null].filter(Boolean).length;

    const empty = E.baseDados.length === 0;

    const cards = data.length===0
      ? `<div class="empty"><div class="empty-emoji">${empty?'📂':'🔍'}</div>
         <h3>${empty?'Base vazia':'Nenhum resultado'}</h3>
         <p>${empty?'Carregue um arquivo .xlsx para começar':'Tente outros termos ou limpe os filtros'}</p>
         ${empty?`<button class="btn-primary" style="margin-top:16px;max-width:260px" onclick="document.getElementById('fileInput').click()">📂 Carregar planilha</button>`:''}</div>`
      : data.map((r,i)=>{
          const isIn=r.ativo==='INATIVO';
          return `<div class="card${isIn?' inativo':''}" style="animation-delay:${Math.min(i*.02,.3)}s">
            <div class="card-bar"></div>
            <div class="card-head">
              <div class="card-av">${this.esc(this.avatar(r.fantasia||r.cliente))}</div>
              <div class="card-head-info">
                <div class="card-fantasia">${this.hl(r.fantasia||this.cleanId(r.cliente),f.q)}</div>
                <div class="card-cod">${this.esc(r._id)} · ${this.hl(this.cleanId(r.cliente),f.q)}</div>
              </div>
              <span class="stag ${isIn?'inativo':'ativo'}">${this.esc(r.ativo)}</span>
            </div>
            <div class="card-fields">
              <div class="cf"><div class="cf-ic">📍</div><div class="cf-body"><span class="cf-lbl">Bairro</span><span class="cf-val">${this.hl(this.cleanId(r.bairro),f.q)}</span></div></div>
              <div class="cf"><div class="cf-ic">🏙️</div><div class="cf-body"><span class="cf-lbl">Cidade</span><span class="cf-val">${this.hl(this.cleanId(r.cidade),f.q)}</span></div></div>
              ${r.endereco?`<div class="cf"><div class="cf-ic">🗺️</div><div class="cf-body"><span class="cf-lbl">Endereço</span><span class="cf-val">${this.hl(r.endereco,f.q)}</span></div></div>`:''}
              ${r.telefone?`<div class="cf"><div class="cf-ic">📞</div><div class="cf-body"><span class="cf-lbl">Telefone</span><span class="cf-val">${this.hl(r.telefone,f.q)}</span></div></div>`:''}
              <div class="cf"><div class="cf-ic">🏢</div><div class="cf-body"><span class="cf-lbl">Razão Social</span><span class="cf-val mono">${this.hl(r.cliente,f.q)}</span></div></div>
            </div>
            <div class="card-div"></div>
            <div class="card-foot">
              <div><div class="lim-lbl">Limite de crédito</div><div class="lim-val ${this.limCls(r.limite)}">${this.fmtR(r.limite)}</div></div>
              <div style="display:flex;gap:6px">
                <button class="act-btn" data-action="agendar" data-idx="${i}">📅</button>
                <button class="act-btn primary" data-action="copiar" data-idx="${i}">📋</button>
              </div>
            </div>
          </div>`;
        }).join('');

    return `
    <div class="topbar">
      <div class="topbar-head">
        <div class="logo">
          <div class="logo-icon">📋</div>
          <div class="logo-text">Clientes Pro<small>${this.esc(E.usuario.empresa||'Filtro inteligente')}</small></div>
        </div>
        <div class="topbar-actions">
          <label class="icon-btn" title="Carregar XLSX" style="cursor:pointer">📂<input type="file" id="fileInput" accept=".xlsx,.xls,.pdf" style="display:none"></label>
          <div style="position:relative">
            <button class="icon-btn" id="themeBtn">🎨</button>
            <div class="theme-panel" id="themePanel">
              <div class="tp-label">Cor do tema</div>
              <div class="color-row">
                <div class="cdot c-ocean" data-c="ocean"></div>
                <div class="cdot c-sunset" data-c="sunset"></div>
                <div class="cdot c-mint" data-c="mint"></div>
                <div class="cdot c-rose" data-c="rose"></div>
                <div class="cdot c-slate" data-c="slate"></div>
              </div>
              <div class="toggle-row">
                <span class="toggle-label" id="themeLabel">🌙 Modo escuro</span>
                <div class="sw" id="darkSw"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="search-wrap">
        <span class="s-icon">🔍</span>
        <input id="searchInput" type="search" placeholder="Buscar por ID, nome, bairro, endereço…" value="${this.esc(f.q)}" autocomplete="off" spellcheck="false">
        <button class="s-clear ${f.q?'on':''}" id="sClear">✕</button>
      </div>
    </div>
    <div class="pills-bar">
      <button class="pill p-all ${f.status==='all'?'on':''}" data-s="all">Todos</button>
      <button class="pill p-ativ ${f.status==='ATIVO'?'on':''}" data-s="ATIVO">✅ Ativo</button>
      <button class="pill p-inat ${f.status==='INATIVO'?'on':''}" data-s="INATIVO">🔴 Inativo</button>
    </div>
    <div class="adv-header" id="advHeader">
      <span>⚙️ Filtros avançados ${advN>0?`<span class="adv-badge on">${advN}</span>`:''}</span>
      <span>${this._advOpen?'▲':'▼'}</span>
    </div>
    <div class="adv-body ${this._advOpen?'open':''}" id="advBody">
      <div class="adv-inner">
        <div class="sel-wrap"><select class="asel" id="cidadeSel">
          <option value="">🏙️ Todas as cidades</option>
          ${cidades.map(c=>`<option value="${this.esc(c)}" ${f.cidade===c?'selected':''}>${this.esc(this.cleanId(c))}</option>`).join('')}
        </select></div>
        <div class="sel-wrap"><select class="asel" id="bairroSel">
          <option value="">📍 Todos os bairros</option>
          ${bairros.map(b=>`<option value="${this.esc(b)}" ${f.bairro===b?'selected':''}>${this.esc(this.cleanId(b))}</option>`).join('')}
        </select></div>
        <div class="range-wrap">
          <div class="range-head"><span>💰 Limite mínimo</span><strong id="limDisp">R$ ${Number(f.limMin).toLocaleString('pt-BR')}</strong></div>
          <input type="range" id="limRange" min="0" max="1502200" step="1000" value="${f.limMin}">
        </div>
        <div class="sel-wrap"><select class="asel" id="sortSel">
          <option value="">📶 Ordem padrão</option>
          <option value="fantasia" ${f.sort==='fantasia'?'selected':''}>🔤 Nome A→Z</option>
          <option value="ld" ${f.sort==='ld'?'selected':''}>💰 Maior limite</option>
          <option value="la" ${f.sort==='la'?'selected':''}>💸 Menor limite</option>
          <option value="cid" ${f.sort==='cid'?'selected':''}>🏙️ Por cidade</option>
          <option value="bai" ${f.sort==='bai'?'selected':''}>📍 Por bairro</option>
        </select></div>
        <div class="adv-clear-btn" id="clearAllBtn">🗑️ Limpar todos os filtros</div>
      </div>
    </div>
    <div class="stats-bar">
      <div><span class="stats-n">${data.length}</span><span class="stats-label"> clientes</span></div>
      <span class="stats-total">${data.length>0?'Σ R$ '+total.toLocaleString('pt-BR',{minimumFractionDigits:0}):''}</span>
    </div>
    <div class="upload-zone" id="upZone">
      <span style="font-size:1.2rem">📂</span>
      <span id="upLabel">${E.baseDados.length>0?E.baseDados.length+' clientes carregados — toque para atualizar':'Carregar arquivo .xlsx'}</span>
    </div>
    <div id="results">${cards}</div>`;
  },

  // ══════════════════════════════════════
  //  TELA 2 — JOGO
  // ══════════════════════════════════════
  renderJogo() {
    const j = E.jogo;
    if(!j.emAndamento) return this._renderJogoSetup();
    return this._renderJogoPainel();
  },

  _renderJogoSetup() {
    const j = E.jogo;
    const cidades = [...new Set(E.baseDados.filter(r=>r.ativo==='ATIVO').map(r=>r.cidade))].sort();
    const temAnterior = j.vendasContabilizadas && j.vendasContabilizadas.length > 0;
    return `
    <div class="page-header">
      <h2>🎮 Modo Rota</h2>
      <p class="page-sub">Configure sua rota de hoje</p>
    </div>
    <div class="page-body">
      ${E.baseDados.length===0?`
      <div class="form-card" style="text-align:center;padding:24px 16px">
        <div style="font-size:2.5rem;margin-bottom:10px">📂</div>
        <div style="font-weight:700;margin-bottom:6px">Base de dados vazia</div>
        <div style="font-size:.78rem;color:var(--text2);margin-bottom:14px">Carregue um arquivo .xlsx com seus clientes para usar o Modo Rota</div>
        <label class="btn-primary" style="display:inline-block;cursor:pointer">📂 Carregar planilha<input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none"></label>
      </div>`:`
      <div class="form-card">
        <div class="form-group">
          <label class="form-label">🏙️ Cidade da rota</label>
          <div class="sel-wrap"><select class="asel" id="jCidade">
            <option value="">Selecione a cidade...</option>
            ${cidades.map(c=>`<option value="${this.esc(c)}">${this.esc(this.cleanId(c))}</option>`).join('')}
          </select></div>
        </div>
        <div id="jBairrosWrap" style="display:none">
          <label class="form-label" style="display:block;margin-bottom:6px">📍 Bairros — toque para selecionar</label>
          <div id="jBairrosGrid" class="bairro-grid"></div>
        </div>
        <div id="jPreview" class="jogo-preview" style="display:none">
          <div class="jp-stat"><span id="jpCount">0</span><small>clientes ativos na rota</small></div>
        </div>
        <button class="btn-primary" id="btnIniciarJogo" style="display:none;margin-top:8px">🚀 Iniciar Rota</button>
      </div>
      ${temAnterior?`
      <div class="form-card" style="border-color:var(--w);background:var(--wbg)">
        <div style="font-size:.82rem;color:var(--w);font-weight:700;margin-bottom:8px">⚠️ Rota não finalizada — ${E.jogo.vendasContabilizadas.length} registros</div>
        <button class="btn-secondary" id="btnRetomar" style="width:100%">↩️ Retomar rota anterior</button>
      </div>`:''}
      `}
    </div>`;
  },

  _renderJogoPainel() {
    const j  = E.jogo;
    const s  = E.statsJogo();
    const q  = this._jogoQ||'';
    const bf = this._jogoBairroFiltro||'';

    const todosRota = E.baseDados.filter(r=>
      r.cidade===j.cidade &&
      (j.bairros.length===0||j.bairros.includes(r.bairro)) &&
      r.ativo==='ATIVO'
    );
    const visitadosSet = new Set(j.vendasContabilizadas.map(v=>v.clienteId));
    const bairrosRota  = [...new Set(todosRota.map(r=>r.bairro))].sort();

    const applyFiltro = lista => {
      let r = lista;
      if(bf) r=r.filter(x=>x.bairro===bf);
      if(q){ const ws=q.toLowerCase().split(/\s+/).filter(Boolean);
        r=r.filter(x=>{ const h=[x._id,x.fantasia,x.cliente,x.bairro,x.endereco,x.telefone||''].join(' ').toLowerCase(); return ws.every(w=>h.includes(w)); }); }
      return r;
    };

    const pendentesAll = todosRota.filter(r=>!visitadosSet.has(r._id));
    const visitadosAll = todosRota.filter(r=> visitadosSet.has(r._id));
    const pendentes    = applyFiltro(pendentesAll);
    const visitados    = applyFiltro(visitadosAll);

    const barras = E.metas.produtos.map(p=>{
      const n  = s.byProd[p.nome]?.positivados||0;
      const pct= Math.min(s.byProd[p.nome]?.pct||0,100);
      const cor= pct>=100?'var(--a2)':pct>=60?'var(--w)':'var(--d)';
      return `<div class="mix-item">
        <div class="mix-head"><span>${this.esc(p.nome)}</span><span style="color:${cor}">${n}/${p.meta}</span></div>
        <div class="mix-bar-bg"><div class="mix-bar-fill" style="width:${pct}%;background:${cor}"></div></div>
      </div>`;
    }).join('');

    // agrupar por bairro
    const grupos = {};
    pendentes.forEach(r=>{ const k=r.bairro||'SEM BAIRRO'; if(!grupos[k])grupos[k]=[]; grupos[k].push(r); });

    const listaPendHTML = Object.entries(grupos).map(([bairro,lista])=>`
      <div class="jogo-bairro-sep">
        <span class="jogo-bairro-nome">📍 ${this.esc(this.cleanId(bairro))}</span>
        <span class="jogo-bairro-count">${lista.length} pendentes</span>
      </div>
      ${lista.map(r=>this._renderJCard(r,false)).join('')}
    `).join('') || `<div class="empty"><div class="empty-emoji">🎉</div><h3>Todos visitados!</h3></div>`;

    const listaVisHTML = visitados.length
      ? visitados.map(r=>this._renderJCard(r,true)).join('')
      : `<div class="empty"><div class="empty-emoji">👟</div><h3>Nenhum visitado ainda</h3></div>`;

    return `
    <div class="jogo-header">
      <div class="jogo-top-row">
        <div class="jogo-cidade">${this.esc(this.cleanId(j.cidade))}</div>
        <button class="js-end" id="btnEncerrar">⛳ Encerrar</button>
      </div>
      <div class="jogo-meta-strip">${barras}</div>
      <div class="jogo-stats-row">
        <div class="js-pill">👟 ${s.visitas}</div>
        <div class="js-pill">💰 ${this.fmtR(s.totalR)}</div>
        <div class="js-pill">⏱️ ${s.tempo}min</div>
        <div class="js-pill">⏳ ${pendentesAll.length} restam</div>
      </div>
    </div>
    <div class="jogo-search-bar">
      <span class="s-icon" style="position:absolute;left:28px;top:50%;transform:translateY(-50%);pointer-events:none">🔍</span>
      <input id="jogoSearch" type="search" value="${this.esc(q)}" placeholder="Buscar na rota por nome, endereço…" autocomplete="off" spellcheck="false">
    </div>
    <div class="jbairro-bar">
      <button class="jbairro-pill ${!bf?'on':''}" data-bf="">Todos (${pendentesAll.length})</button>
      ${bairrosRota.map(b=>`<button class="jbairro-pill ${bf===b?'on':''}" data-bf="${this.esc(b)}">${this.esc(this.cleanId(b))} (${todosRota.filter(r=>r.bairro===b&&!visitadosSet.has(r._id)).length})</button>`).join('')}
    </div>
    <div class="jogo-tabs">
      <button class="jtab on" data-tab="pendentes">Pendentes (${pendentes.length})</button>
      <button class="jtab" data-tab="visitados">Visitados (${visitados.length})</button>
    </div>
    <div id="jogoLista" data-current="pendentes">
      <div id="tabPendentes">${listaPendHTML}</div>
      <div id="tabVisitados" style="display:none">${listaVisHTML}</div>
    </div>`;
  },

  _renderJCard(r, visitado) {
    const tel = r.telefone||'';
    const isIn = r.ativo==='INATIVO';
    return `<div class="jcard ${visitado?'visited':''}" id="jcard_${this.esc(r._id)}">
      <div class="jcard-head" data-action="expandir" data-id="${this.esc(r._id)}">
        <div class="card-av small ${isIn?'inativo':''}">${this.esc(this.avatar(r.fantasia||r.cliente))}</div>
        <div style="flex:1;min-width:0">
          <div class="jcard-nome">${this.esc(r.fantasia||this.cleanId(r.cliente))}</div>
          <div class="jcard-end">${this.esc(r.endereco||'Endereço não informado')}</div>
          ${tel?`<div class="jcard-tel">📞 ${this.esc(tel)}</div>`:'<div class="jcard-tel" style="color:var(--text3)">📞 Sem telefone</div>'}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <div class="jcard-lim">${this.fmtR(r.limite)}</div>
          <span style="font-size:.58rem;color:var(--text3)">▼ ver mais</span>
        </div>
      </div>
      <div class="jcard-expand" id="jcexp_${this.esc(r._id)}" style="display:none">
        <div class="jcard-info-grid">
          <div class="jinfo"><span class="jinfo-lbl">ID</span><span class="jinfo-val">${this.esc(r._id)}</span></div>
          <div class="jinfo"><span class="jinfo-lbl">Status</span>
            <span class="jinfo-val" style="color:${isIn?'var(--d)':'var(--a2)'}">${this.esc(r.ativo)}</span>
          </div>
          <div class="jinfo jinfo-full"><span class="jinfo-lbl">Razão Social</span>
            <span class="jinfo-val mono">${this.esc(r.cliente)}</span>
          </div>
          <div class="jinfo jinfo-full"><span class="jinfo-lbl">✏️ Endereço</span>
            <input class="jinfo-edit" data-field="endereco" data-id="${this.esc(r._id)}" value="${this.esc(r.endereco||'')}" placeholder="Endereço...">
          </div>
          <div class="jinfo jinfo-full"><span class="jinfo-lbl">✏️ Telefone / WhatsApp</span>
            <div style="display:flex;gap:6px;align-items:center">
              <input class="jinfo-edit" style="flex:1" data-field="telefone" data-id="${this.esc(r._id)}" value="${this.esc(tel)}" placeholder="(xx) xxxxx-xxxx" type="tel">
              ${tel?`<a href="https://wa.me/55${tel.replace(/\D/g,'')}" target="_blank" class="wa-btn">💬 WhatsApp</a>`:''}
            </div>
          </div>
          <div class="jinfo jinfo-full"><span class="jinfo-lbl">✏️ Observação</span>
            <input class="jinfo-edit" data-field="obs" data-id="${this.esc(r._id)}" value="${this.esc(r.obs||'')}" placeholder="Anotações sobre o cliente…">
          </div>
        </div>
        ${!visitado?`<div class="jcard-actions">
          <button class="jbtn verde" data-action="venda" data-id="${this.esc(r._id)}">🛒 Venda</button>
          <button class="jbtn azul"  data-action="agendar_rota" data-id="${this.esc(r._id)}">📅 Agendar</button>
          <button class="jbtn cinza" data-action="sem_venda" data-id="${this.esc(r._id)}">❌ Sem venda</button>
        </div>`:''}
      </div>
    </div>`;
  },

  // ══════════════════════════════════════
  //  TELA 3 — VISITA / VENDA
  // ══════════════════════════════════════
  renderVisita() {
    const { clienteId } = this._params;
    const r = E.baseDados.find(x=>x._id===clienteId)||{};
    return `
    <div class="page-header">
      <button class="back-btn" id="backBtn">← Voltar</button>
      <h2>🛒 Registrar Venda</h2>
      <p class="page-sub">${this.esc(r.fantasia||this.cleanId(r.cliente))}</p>
    </div>
    <div class="page-body">
      <div class="form-card">
        <div id="vendaItens"></div>
        <button class="btn-secondary" id="addItemBtn" style="width:100%;margin-bottom:10px">+ Adicionar produto</button>
        <div class="venda-total-wrap">
          <span>Total da venda</span>
          <strong id="vendaTotal" class="venda-total">R$ 0,00</strong>
        </div>
        <button class="btn-primary" id="confirmarVenda">✅ Confirmar venda</button>
      </div>
    </div>`;
  },

  // ══════════════════════════════════════
  //  TELA 4 — AGENDA
  // ══════════════════════════════════════
  renderAgenda() {
    const hoje = new Date().toISOString().split('T')[0];
    const agenda = E.agenda.filter(a=>!a.concluido).sort((a,b)=>a.data.localeCompare(b.data));
    const vencidos = agenda.filter(a=>a.data<hoje);
    const hj       = agenda.filter(a=>a.data===hoje);
    const futuros  = agenda.filter(a=>a.data>hoje);

    const grp = (items, lbl, cor) => !items.length?'':
      `<div class="agenda-group">
        <div class="agenda-group-label" style="color:${cor}">${lbl} (${items.length})</div>
        ${items.map(a=>{
          const c=E.baseDados.find(r=>r._id===a.clienteId);
          const nome=c?(c.fantasia||this.cleanId(c.cliente)):a.clienteId;
          return `<div class="agenda-card">
            <div class="agenda-card-head">
              <div>
                <div class="agenda-nome">${this.esc(nome)}</div>
                <div class="agenda-data" style="color:${cor}">${new Date(a.data+'T12:00:00').toLocaleDateString('pt-BR')}</div>
              </div>
              <button class="act-btn primary" data-action="concluir_agenda" data-agid="${a.id}">✅</button>
            </div>
            ${a.obs?`<div class="agenda-obs">${this.esc(a.obs)}</div>`:''}

        }).join('')}
      </div>`;

    return `

      ${!agenda.length?`<div class="empty"><div class="empty-emoji">📅</div><h3>Agenda vazia</h3><p>Agende retornos durante a rota.</p></div>`:''}
    </div>`;
  },

  checkarPerfil() {

      this._showModal(`

  // ══════════════════════════════════════
  //  BIND EVENTS
  // ══════════════════════════════════════
  _bind() {
    const $ = id => document.getElementById(id);
    const on = (id,ev,fn) => { const el=$(id); if(el) el.addEventListener(ev,fn); };

    // TEMA
    on('themeBtn','click',()=>{ this._tpOpen=!this._tpOpen; $('themePanel')?.classList.toggle('open',this._tpOpen); });
    on('darkSw','click',()=>this._toggleDark());
    document.querySelectorAll('.cdot[data-c]').forEach(el=>{
      if(document.documentElement.dataset.color===el.dataset.c) el.classList.add('sel');
      el.addEventListener('click',()=>this._setColor(el.dataset.c,el));
    });
    document.addEventListener('click', e=>{
      if(this._tpOpen&&!e.target.closest('#themePanel')&&!e.target.closest('#themeBtn')){
        this._tpOpen=false; $('themePanel')?.classList.remove('open');
      }
    },{once:true});

    // LISTA FILTROS
    on('searchInput','input',e=>{ this._filtros.q=e.target.value; this.render(); });
    on('sClear','click',()=>{ this._filtros.q=''; this.render(); });
    on('advHeader','click',()=>{ this._advOpen=!this._advOpen; this.render(); });
    on('cidadeSel','change',e=>{ this._filtros.cidade=e.target.value; this._filtros.bairro=''; this.render(); });
    on('bairroSel','change',e=>{ this._filtros.bairro=e.target.value; this.render(); });
    on('sortSel','change',e=>{ this._filtros.sort=e.target.value; this.render(); });
    on('clearAllBtn','click',()=>{ this._filtros={q:'',status:'all',cidade:'',bairro:'',limMin:0,sort:''}; this._advOpen=false; this.render(); });
    on('limRange','input',e=>{ this._filtros.limMin=parseFloat(e.target.value)||0; $('limDisp').textContent='R$ '+Number(e.target.value).toLocaleString('pt-BR'); });
    on('limRange','change',()=>this.render());
    document.querySelectorAll('.pill[data-s]').forEach(p=>p.addEventListener('click',()=>{ this._filtros.status=p.dataset.s; this.render(); }));

    // UPLOAD
    const fi=$('fileInput'); if(fi) fi.addEventListener('change',e=>this._handleFile(e.target.files[0]));
    on('upZone','click',()=>$('fileInput')?.click());

    // ACTIONS (lista + jogo)
    document.querySelectorAll('[data-action]').forEach(el=>{
      el.addEventListener('click',e=>{
        e.stopPropagation();
        const a=el.dataset.action, idx=parseInt(el.dataset.idx), id=el.dataset.id, agid=parseInt(el.dataset.agid), pid=parseInt(el.dataset.pid);
        if(a==='copiar')        this._copiarCard(idx);
        if(a==='agendar')       this._modalAgendar(window.__filtered?.[idx]?._id);
        if(a==='concluir_agenda') { E.concluirAgenda(agid); this.render(); }
        if(a==='del_prod')      { E.removerProduto(pid); this.render(); }
        if(a==='venda')         this.ir('jogo_visita',{clienteId:id});
        if(a==='agendar_rota')  this._modalAgendarRota(id);
        if(a==='sem_venda')     { E.registrarVenda(id,'SEM VENDA',0,0); this.render(); }
        if(a==='expandir')      this._toggleExpand(id);
      });
    });

    // JCARD INLINE EDIT — salva ao sair do campo
    document.querySelectorAll('.jinfo-edit').forEach(inp=>{
      inp.addEventListener('blur',()=>{
        const id=inp.dataset.id, field=inp.dataset.field, val=inp.value.trim();
        E.atualizarCliente(id,{[field]:val});
        // atualizar WhatsApp link ao vivo se for telefone
        if(field==='telefone'){
          const num=val.replace(/\D/g,'');
          const expand=document.getElementById('jcexp_'+id);
          if(expand){
            const existing=expand.querySelector('.wa-btn');
            if(existing) existing.href='https://wa.me/55'+num;
            else if(num){
              const a=document.createElement('a');
              a.href='https://wa.me/55'+num; a.target='_blank';
              a.className='wa-btn'; a.textContent='💬 WhatsApp';
              inp.parentElement.appendChild(a);
            }
          }
        }
      });
      // Enter = blur
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') inp.blur(); });
    });

    // JOGO SETUP
    on('jCidade','change',e=>{
      const cid=e.target.value;
      const bairros=[...new Set(E.baseDados.filter(r=>r.cidade===cid&&r.ativo==='ATIVO').map(r=>r.bairro))].sort();
      const grid=$('jBairrosGrid'), wrap=$('jBairrosWrap');
      if(!grid||!wrap) return;
      wrap.style.display=cid?'block':'none';
      this._jBairrosSel=new Set();
      grid.innerHTML=bairros.map(b=>`<div class="bairro-chip" data-b="${this.esc(b)}">${this.esc(this.cleanId(b))}</div>`).join('');
      grid.querySelectorAll('.bairro-chip').forEach(ch=>{
        ch.addEventListener('click',()=>{
          ch.classList.toggle('sel');
          if(ch.classList.contains('sel')) this._jBairrosSel.add(ch.dataset.b);
          else this._jBairrosSel.delete(ch.dataset.b);
          const sel=[...this._jBairrosSel];
          const n=E.baseDados.filter(r=>r.cidade===cid&&r.ativo==='ATIVO'&&(sel.length===0||sel.includes(r.bairro))).length;
          const prev=$('jpCount'); if(prev) prev.textContent=n;
          const pr=$('jPreview'); if(pr) pr.style.display='flex';
          const btn=$('btnIniciarJogo'); if(btn) btn.style.display='block';
        });
      });
      // mostrar count inicial (todos os bairros)
      const n=E.baseDados.filter(r=>r.cidade===cid&&r.ativo==='ATIVO').length;
      const pr=$('jPreview'); if(pr) pr.style.display='flex';
      const prev=$('jpCount'); if(prev) prev.textContent=n;
      const btn=$('btnIniciarJogo'); if(btn) btn.style.display='block';
    });
    on('btnIniciarJogo','click',()=>{
      const cid=$('jCidade')?.value; if(!cid) return;
      this._jogoQ=''; this._jogoBairroFiltro='';
      E.iniciarJogo(cid,[...this._jBairrosSel]);
      this.render();
    });
    on('btnRetomar','click',()=>{ E.jogo.emAndamento=true; E.save(); this.render(); });
    on('btnEncerrar','click',()=>{ if(confirm('Encerrar rota atual?')){ E.encerrarJogo(); this._jogoQ=''; this._jogoBairroFiltro=''; this.render(); } });

    // JOGO BUSCA
    on('jogoSearch','input',e=>{ this._jogoQ=e.target.value; this.render(); });

    // JOGO BAIRRO PILLS
    document.querySelectorAll('.jbairro-pill[data-bf]').forEach(b=>{
      b.addEventListener('click',()=>{ this._jogoBairroFiltro=b.dataset.bf; this.render(); });
    });

    // JOGO TABS
    document.querySelectorAll('.jtab[data-tab]').forEach(tab=>{
      tab.addEventListener('click',()=>{
        document.querySelectorAll('.jtab').forEach(t=>t.classList.remove('on'));
        tab.classList.add('on');
        const isPend=tab.dataset.tab==='pendentes';
        const p=$('tabPendentes'), v=$('tabVisitados');
        if(p) p.style.display=isPend?'block':'none';
        if(v) v.style.display=isPend?'none':'block';
      });
    });

    // VISITA / VENDA
    on('backBtn','click',()=>this.ir('jogo'));
    on('addItemBtn','click',()=>this._addItemVenda());
    on('confirmarVenda','click',()=>this._confirmarVenda());

    // CONFIG
    on('addProdBtn','click',()=>{
      const nome=$('novoProdNome')?.value.trim(); if(!nome)return;
      const meta=parseInt($('novoProdMeta')?.value)||10;
      E.adicionarProduto(nome,meta); this.render();
    });
    document.querySelectorAll('.mini-input[data-pid]').forEach(inp=>{
      inp.addEventListener('change',()=>E.editarMeta(parseInt(inp.dataset.pid),inp.value));
    });
    on('salvarPerfil','click',()=>{
      E.usuario.nome=$('cfgNome')?.value.trim()||E.usuario.nome;
      E.usuario.empresa=$('cfgEmpresa')?.value.trim()||E.usuario.empresa;
      E.save(); this._toast('✅ Perfil salvo!'); this.render();
    });
    on('exportBtn','click',()=>{
      const blob=new Blob([JSON.stringify({baseDados:E.baseDados,agenda:E.agenda,metas:E.metas},null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='clientes_pro_backup.json'; a.click();
    });
    on('resetDadosBtn','click',()=>{
      if(confirm('Apagará novos cadastros e edições. Continuar?')){ localStorage.removeItem('cp_dados'); location.reload(); }
    });

    // CADASTRO
    on('salvarNovoCliente','click',()=>{
      const fantasia=$('ncFantasia')?.value.trim(); if(!fantasia){this._toast('⚠️ Nome fantasia obrigatório');return;}
      E.adicionarCliente({
        fantasia, cliente:$('ncCliente')?.value.trim()||fantasia,
        telefone:$('ncTelefone')?.value.trim()||'',
        endereco:$('ncEndereco')?.value.trim()||'',
        bairro:($('ncBairro')?.value.trim()||'NÃO INFORMADO').toUpperCase(),
        cidade:$('ncCidade')?.value||'',
        limite:parseFloat($('ncLimite')?.value)||0,
        obs:$('ncObs')?.value.trim()||'', ativo:'ATIVO'
      });
      this._toast('✅ Cliente salvo!'); this.ir('lista');
    });
  },

  // ── EXPAND JCARD ──
  _toggleExpand(id) {
    const el = document.getElementById('jcexp_'+id);
    if(!el) return;
    const open = el.style.display==='none';
    el.style.display = open ? 'block' : 'none';
    const head = el.previousElementSibling;
    if(head) {
      const hint = head.querySelector('span[style*="ver mais"], span[style*="fechar"]');
      if(hint) hint.textContent = open ? '▲ fechar' : '▼ ver mais';
    }
  },

  // ── VENDA ──
  _addItemVenda() {
    const el=document.getElementById('vendaItens'); if(!el)return;
    const div=document.createElement('div'); div.className='venda-item';
    div.innerHTML=`
      <div class="sel-wrap" style="flex:2"><select class="asel vi-prod">
        <option value="">Produto...</option>
        ${E.metas.produtos.map(p=>`<option value="${this.esc(p.nome)}">${this.esc(p.nome)}</option>`).join('')}
      </select></div>
      <input class="mini-input vi-qtd" type="number" value="1" min="1">
      <input class="mini-input vi-val" type="number" value="0" min="0" step="0.01" placeholder="R$">
      <button class="del-btn vi-del">🗑️</button>`;
    div.querySelector('.vi-del').addEventListener('click',()=>{ div.remove(); this._calcTotal(); });
    div.querySelectorAll('input,select').forEach(i=>i.addEventListener('input',()=>this._calcTotal()));
    el.appendChild(div);
  },
  _calcTotal() {
    let t=0;
    document.querySelectorAll('.venda-item').forEach(d=>{
      t+=(parseFloat(d.querySelector('.vi-qtd')?.value)||0)*(parseFloat(d.querySelector('.vi-val')?.value)||0);
    });
    const el=document.getElementById('vendaTotal'); if(el) el.textContent='R$ '+t.toLocaleString('pt-BR',{minimumFractionDigits:2});
  },
  _confirmarVenda() {
    const {clienteId}=this._params; let ok=false;
    document.querySelectorAll('.venda-item').forEach(d=>{
      const prod=d.querySelector('.vi-prod')?.value, qtd=parseFloat(d.querySelector('.vi-qtd')?.value)||0, val=parseFloat(d.querySelector('.vi-val')?.value)||0;
      if(prod&&qtd>0){ E.registrarVenda(clienteId,prod,qtd,val); ok=true; }
    });
    if(!ok){this._toast('⚠️ Adicione pelo menos um produto');return;}
    this._toast('✅ Venda registrada!'); this.ir('jogo');
  },

  // ── MODAIS ──
  _modalAgendar(clienteId, onConfirm) {
    const hoje=new Date().toISOString().split('T')[0];
    this._showModal(`<div class="modal">
      <div class="modal-title">📅 Agendar Retorno</div>
      <div class="form-group"><label class="form-label">Data</label>
        <input class="asel" id="agData" type="date" value="${hoje}" min="${hoje}" style="padding:9px 12px"></div>
      <div class="form-group"><label class="form-label">Observação</label>
        <input class="asel" id="agObs" placeholder="Ex: Visitar pela manhã" style="padding:9px 12px"></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn-secondary" id="agCancel" style="flex:1">Cancelar</button>
        <button class="btn-primary" id="agConfirm" style="flex:2">Agendar</button>
      </div>
    </div>`);
    document.getElementById('agCancel')?.addEventListener('click',()=>this._closeModal());
    document.getElementById('agConfirm')?.addEventListener('click',()=>{
      const d=document.getElementById('agData')?.value, o=document.getElementById('agObs')?.value;
      if(!d)return;
      if(onConfirm) onConfirm(d,o);
      else E.agendarRetorno(clienteId,d,o);
      this._closeModal(); this._toast('✅ Agendado!');
    });
  },
  _modalAgendarRota(clienteId) {
    this._modalAgendar(clienteId,(d,o)=>{ E.agendarEmRota(clienteId,d,o); this.render(); });
  },
  _showModal(html) {
    let ov=document.getElementById('modalOverlay');
    if(!ov){ ov=document.createElement('div'); ov.id='modalOverlay'; ov.className='modal-overlay'; document.body.appendChild(ov); }
    ov.innerHTML=html; ov.style.display='flex';
  },
  _closeModal() { const ov=document.getElementById('modalOverlay'); if(ov) ov.style.display='none'; },

  // ── COPIAR ──
  _copiarCard(idx) {
    const r=window.__filtered?.[idx]; if(!r)return;
    const txt=['📋 '+(r.fantasia||r.cliente),'🏢 '+r.cliente,'📍 '+r.bairro,'🏙️ '+r.cidade,r.endereco?'🗺️ '+r.endereco:'',r.telefone?'📞 '+r.telefone:'','💰 '+this.fmtR(r.limite),'Status: '+r.ativo].filter(Boolean).join('\n');
    if(navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>this._toast('✅ Copiado!'));
    else { const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);this._toast('✅ Copiado!'); }
  },

  // ── TOAST ──
  _toast(msg) {
    const t=document.getElementById('toast'); if(!t)return;
    t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200);
  },

  // ── FILE UPLOAD ──
  _handleFile(file) {
    if(!file)return;
    if(typeof XLSX==='undefined'){this._toast('⏳ Aguarde…');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try {
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        E.processarPlanilhaBruta(rows);
        this._filtros={q:'',status:'all',cidade:'',bairro:'',limMin:0,sort:''};
        this._toast('✅ '+E.baseDados.length+' clientes carregados!');
        this.render();
      } catch(err){this._toast('❌ Erro ao ler arquivo');console.error(err);}
    };
    reader.readAsArrayBuffer(file);
  },

  // ── TEMA ──
  _setColor(c,el){ document.documentElement.dataset.color=c; document.querySelectorAll('.cdot').forEach(d=>d.classList.toggle('sel',d.dataset.c===c)); localStorage.setItem('cp_color',c); },
  _toggleDark(){ const n=document.documentElement.dataset.theme==='dark'?'light':'dark'; document.documentElement.dataset.theme=n; localStorage.setItem('cp_theme',n); const l=document.getElementById('themeLabel'); if(l)l.textContent=n==='dark'?'🌙 Modo escuro':'☀️ Modo claro'; },

  // ── NAV ──
  _updateNav() {
    document.querySelectorAll('.nav-btn[data-tela]').forEach(b=>b.classList.toggle('active',b.dataset.tela===this.tela||(this.tela==='jogo_visita'&&b.dataset.tela==='jogo')));
    const ab=document.getElementById('agendaBadge'); if(ab){const n=E.agenda.filter(a=>!a.concluido).length; ab.textContent=n; ab.style.display=n>0?'inline':'none';}
    const jb=document.getElementById('jogoBadge'); if(jb) jb.style.display=E.jogo.emAndamento?'inline':'none';
  }
};


(function() {
  // PROTEÇÃO — roda primeiro
  if (!GUARD.init()) return;

  // Restaurar tema
  const t = localStorage.getItem('cp_theme');
  const c = localStorage.getItem('cp_color');
  if (t) document.documentElement.dataset.theme = t;
  if (c) document.documentElement.dataset.color = c;

  // Iniciar engine
  E.carregarBase();
  UI.ir('lista');
  setTimeout(() => UI.checkarPerfil(), 400);
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
